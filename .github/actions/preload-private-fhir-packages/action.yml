name: Pre-load private FHIR packages from npm.cognovis.de
description: >
  Authenticates against npm.cognovis.de and pre-loads private FHIR packages into the
  FHIR package cache (~/.fhir/packages/) so SUSHI and the IG Publisher can resolve
  them without hitting the public FHIR package registries (which return 404 for private packages).

  Currently pre-loads:
    - de.cognovis.terminology.imaging@1.0.0      (transitive dep from de.cognovis.fhir.praxis)
    - de.cognovis.terminology.kbv@1.0.0          (transitive dep from de.cognovis.fhir.praxis)
    - kbv.mio.impfpass.vocab@1.1.0-cognovis.1    (transitive dep from de.cognovis.fhir.praxis;
                                                  cognovis fork — public registry returns 404)
    - de.cognovis.terminology.dental.* (5 pkgs)  (direct deps in sushi-config.yaml; private on
                                                  npm.cognovis.de, so SUSHI's own fetch gets 401 —
                                                  must be pre-loaded with auth like the others)

inputs:
  verdaccio-token:
    description: Authentication token for npm.cognovis.de (Verdaccio)
    required: true

runs:
  using: composite
  steps:
    - name: Fetch private packages into FHIR cache
      shell: bash
      env:
        VERDACCIO_TOKEN: ${{ inputs.verdaccio-token }}
      run: |
        if [ -z "${VERDACCIO_TOKEN:-}" ]; then
          echo "::error::verdaccio-token input is empty — cannot fetch private FHIR packages"
          exit 1
        fi
        {
          echo "//npm.cognovis.de/:_password=${VERDACCIO_TOKEN}"
          echo "//npm.cognovis.de/:username=cognovis"
          echo "//npm.cognovis.de/:email=info@cognovis.de"
          echo "//npm.cognovis.de/:always-auth=true"
        } >> ~/.npmrc

        fetch_to_fhir_cache() {
          local pkg="$1" version="$2"
          local cache_dir="${HOME}/.fhir/packages/${pkg}#${version}"
          if [ -d "$cache_dir/package" ] && [ -f "$cache_dir/package/package.json" ]; then
            echo "$pkg#$version already cached — skipping"
            return
          fi
          echo "Fetching $pkg@$version from npm.cognovis.de..."
          local pack_dir
          pack_dir=$(mktemp -d)
          ( cd "$pack_dir" && npm pack "${pkg}@${version}" --registry https://npm.cognovis.de >/dev/null )
          local tgz
          tgz=$(ls "$pack_dir"/*.tgz | head -1)
          mkdir -p "$cache_dir"
          tar xzf "$tgz" -C "$cache_dir"
          echo "  Installed $(ls "$cache_dir/package/" | wc -l) files into $cache_dir"
        }

        fetch_to_fhir_cache "de.cognovis.terminology.imaging" "1.0.0"
        fetch_to_fhir_cache "de.cognovis.terminology.kbv" "1.0.0"
        fetch_to_fhir_cache "kbv.mio.impfpass.vocab" "1.1.0-cognovis.1"

        # Direct dental terminology deps from sushi-config.yaml. These are private
        # ($authenticated) on npm.cognovis.de, so SUSHI's anonymous fetch returns 401
        # and the build fails ("Failed to download ... from the registry"). Pre-load
        # them into the cache with auth so SUSHI/IG-Publisher resolve them offline.
        fetch_to_fhir_cache "de.cognovis.terminology.dental.lekholm-zarb" "1.0.0"
        fetch_to_fhir_cache "de.cognovis.terminology.dental.impaction" "1.0.0"
        fetch_to_fhir_cache "de.cognovis.terminology.dental.gingival-recession" "2.0.0"
        fetch_to_fhir_cache "de.cognovis.terminology.dental.routine-befund" "1.0.0"
        fetch_to_fhir_cache "de.cognovis.terminology.dental.par-richtlinie" "1.0.0"
