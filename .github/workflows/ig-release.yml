name: IG Release — Publish & Deploy

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "ig-release"
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION file
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag ${TAG_VERSION} does not match VERSION file ${FILE_VERSION}"
            exit 1
          fi
          echo "Version match confirmed: ${FILE_VERSION}"

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Install fhir-praxis-de dependency
        run: |
          # Always use latest praxis release from GitHub
          RELEASE_JSON=$(curl -s https://api.github.com/repos/cognovis/fhir-praxis-de/releases/latest)
          ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | startswith("de.cognovis.fhir.praxis"))] | last | .browser_download_url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "::error::Could not find fhir-praxis-de release asset"
            exit 1
          fi
          echo "Downloading praxis dependency from: $ASSET_URL"
          curl -L -o /tmp/praxis.tgz "$ASSET_URL"
          # Extract actual version from downloaded package
          PRAXIS_VERSION=$(tar xzf /tmp/praxis.tgz -O package/package.json | jq -r '.version')
          echo "Praxis version: $PRAXIS_VERSION"
          # Update sushi-config.yaml to match (keeps SUSHI cache lookup in sync)
          sed -i "s|de\.cognovis\.fhir\.praxis:.*|de.cognovis.fhir.praxis: $PRAXIS_VERSION    # Praxis-DE Foundation — auto-updated to latest|" sushi-config.yaml
          # Install under versioned name and current (for backwards compat)
          for LABEL in "$PRAXIS_VERSION" "current"; do
            mkdir -p "$HOME/.fhir/packages/de.cognovis.fhir.praxis#${LABEL}"
            tar xzf /tmp/praxis.tgz -C "$HOME/.fhir/packages/de.cognovis.fhir.praxis#${LABEL}/"
          done

      - name: Run SUSHI
        run: sushi .

      - name: Pre-load private FHIR packages from npm.cognovis.de
        uses: ./.github/actions/preload-private-fhir-packages
        with:
          verdaccio-token: ${{ secrets.VERDACCIO_TOKEN }}

      - name: Install Jekyll
        run: sudo gem install jekyll

      - name: Download IG Publisher
        run: |
          mkdir -p input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o input-cache/publisher.jar

      - name: Run IG Publisher
        run: java -jar input-cache/publisher.jar -ig . -no-sushi

      - name: Copy root files to output
        run: |
          [ -f ".package-list.json" ] && cp .package-list.json output/package-list.json
          [ -f "publication-request.json" ] && cp publication-request.json output/

      - name: Build FHIR package
        run: bash scripts/build-package.sh --skip-sushi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/*.tgz
            output/full-ig.zip
          generate_release_notes: true
          make_latest: true

      - name: Publish to FHIR Package Registry
        env:
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
        run: |
          # FHIR packages have non-npm dependencies that confuse npm publish.
          # Use --ignore-scripts to skip dependency resolution.
          echo "//npm.cognovis.de/:_password=${VERDACCIO_TOKEN}" >> ~/.npmrc
          echo "//npm.cognovis.de/:username=cognovis" >> ~/.npmrc
          echo "//npm.cognovis.de/:email=info@cognovis.de" >> ~/.npmrc

          PKG=$(ls dist/*.tgz | head -1)
          echo "Publishing ${PKG} to npm.cognovis.de..."
          # Use absolute path — npm can misinterpret relative paths as package specs
          ABSPKG="$(pwd)/${PKG}"
          npm publish "${ABSPKG}" --registry https://npm.cognovis.de --ignore-scripts 2>&1 | tee /tmp/npm-publish.log
          EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" -ne 0 ]; then
            if grep -q "EPUBLISHCONFLICT\|already_published\|409\|cannot publish over" /tmp/npm-publish.log; then
              echo "::warning::Package version already exists in registry — skipping"
            else
              cat /tmp/npm-publish.log
              exit "$EXIT"
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  update-package-list:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Read version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=$(echo "$TAG_NAME" | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Update package-list.json on fhir.cognovis.de
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          IG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 116.202.111.75 >> ~/.ssh/known_hosts 2>/dev/null

          TODAY=$(date -u +%Y-%m-%d)

          # Update package-list.json on the server via python3 (jq not installed)
          ssh -i ~/.ssh/deploy_key fhir@116.202.111.75 python3 -s - "$IG_VERSION" "$TODAY" << 'REMOTE_SCRIPT'
          import json, sys, shutil

          version, today = sys.argv[1], sys.argv[2]
          pkg_list = "/var/www/fhir/dental/package-list.json"

          # Backup
          shutil.copy2(pkg_list, pkg_list + ".bak")

          with open(pkg_list) as f:
              data = json.load(f)

          # Mark all existing version entries as not current
          for entry in data["list"]:
              if "current" in entry:
                  entry["current"] = False

          # Insert new version after the ci-build entry (index 0)
          new_entry = {
              "version": version,
              "date": today,
              "desc": f"Release {version}",
              "path": "https://fhir.cognovis.de/dental",
              "status": "trial-use",
              "sequence": "STU1",
              "fhirversion": "4.0.1",
              "current": True,
              "package": f"de.cognovis.fhir.dental#{version}"
          }
          data["list"].insert(1, new_entry)

          with open(pkg_list, "w") as f:
              json.dump(data, f, indent=2)

          print(f"Updated package-list.json: version {version}, date {today}")
          REMOTE_SCRIPT

  dispatch:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Read version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=$(echo "$TAG_NAME" | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Send repository_dispatch to downstream consumer
        env:
          DOWNSTREAM_DISPATCH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
          DOWNSTREAM_REPOSITORY: ${{ vars.DOWNSTREAM_REPOSITORY }}
          IG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${DOWNSTREAM_REPOSITORY}" ] || [ -z "${DOWNSTREAM_DISPATCH_TOKEN}" ]; then
            echo "::warning::Downstream dispatch not configured — skipping"
            exit 0
          fi

          curl -sf -X POST \
            -H "Authorization: token ${DOWNSTREAM_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${DOWNSTREAM_REPOSITORY}/dispatches" \
            -d "{\"event_type\": \"ig-published\", \"client_payload\": {\"version\": \"${IG_VERSION}\", \"package_id\": \"de.cognovis.fhir.dental\"}}"
          echo "repository_dispatch sent to downstream consumer"
