name: IG Release — Publish & Deploy

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "ig-release"
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION file
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag ${TAG_VERSION} does not match VERSION file ${FILE_VERSION}"
            exit 1
          fi
          echo "Version match confirmed: ${FILE_VERSION}"

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Install fhir-praxis-de dependency
        run: |
          # Pinned to v0.69.1 — update sushi-config.yaml and this step together when bumping
          PRAXIS_TAG="v0.69.1"
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/cognovis/fhir-praxis-de/releases/tags/${PRAXIS_TAG}")
          ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '[.assets[]? | select(.name | startswith("de.cognovis.fhir.praxis"))] | last | .browser_download_url // empty')
          if [ -n "$ASSET_URL" ]; then
            echo "Downloading praxis dependency from GitHub release: $ASSET_URL"
            curl -L -o /tmp/praxis.tgz "$ASSET_URL"
          else
            PRAXIS_VER="${PRAXIS_TAG#v}"
            NPM_URL="https://npm.cognovis.de/de.cognovis.fhir.praxis/-/de.cognovis.fhir.praxis-${PRAXIS_VER}.tgz"
            echo "GitHub release ${PRAXIS_TAG} not found; falling back to npm.cognovis.de: $NPM_URL"
            curl -L -o /tmp/praxis.tgz "$NPM_URL"
          fi
          # Extract actual version from downloaded package
          PRAXIS_VERSION=$(tar xzf /tmp/praxis.tgz -O package/package.json | jq -r '.version')
          echo "Praxis version: $PRAXIS_VERSION"
          # Update sushi-config.yaml to match (keeps SUSHI cache lookup in sync)
          sed -i "s|de\.cognovis\.fhir\.praxis:.*|de.cognovis.fhir.praxis: $PRAXIS_VERSION    # Praxis-DE Foundation — pinned to $PRAXIS_VERSION|" sushi-config.yaml
          # Install under versioned name and current (for backwards compat)
          for LABEL in "$PRAXIS_VERSION" "current"; do
            mkdir -p "$HOME/.fhir/packages/de.cognovis.fhir.praxis#${LABEL}"
            tar xzf /tmp/praxis.tgz -C "$HOME/.fhir/packages/de.cognovis.fhir.praxis#${LABEL}/"
          done

      - name: Pre-load private FHIR packages from npm.cognovis.de
        uses: ./.github/actions/preload-private-fhir-packages
        with:
          verdaccio-token: ${{ secrets.VERDACCIO_TOKEN }}

      - name: Generate KBV Basis snapshots (KBV publishes kbv.basis without snapshots)
        uses: ./.github/actions/generate-kbv-basis-snapshots

      - name: Run SUSHI
        run: sushi .

      - name: Install Jekyll
        run: sudo gem install jekyll

      - name: Download IG Publisher
        run: |
          mkdir -p input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o input-cache/publisher.jar

      - name: Run IG Publisher
        run: java -jar input-cache/publisher.jar -ig . -no-sushi

      - name: Copy root files to output
        run: |
          [ -f ".package-list.json" ] && cp .package-list.json output/package-list.json
          [ -f "publication-request.json" ] && cp publication-request.json output/

      - name: Build FHIR package
        run: bash scripts/build-package.sh --skip-sushi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/*.tgz
            output/full-ig.zip
          generate_release_notes: true
          make_latest: true

      - name: Publish to FHIR Package Registry
        env:
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
        run: |
          # FHIR packages have non-npm dependencies that confuse npm publish.
          # Use --ignore-scripts to skip dependency resolution.
          {
            echo "//npm.cognovis.de/:_password=${VERDACCIO_TOKEN}"
            echo "//npm.cognovis.de/:username=cognovis"
            echo "//npm.cognovis.de/:email=info@cognovis.de"
          } >> ~/.npmrc

          PKG=$(find dist -maxdepth 1 -name '*.tgz' -print -quit)
          echo "Publishing ${PKG} to npm.cognovis.de..."
          # Use absolute path — npm can misinterpret relative paths as package specs
          ABSPKG="$(pwd)/${PKG}"
          npm publish "${ABSPKG}" --registry https://npm.cognovis.de --ignore-scripts 2>&1 | tee /tmp/npm-publish.log
          EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" -ne 0 ]; then
            if grep -q "EPUBLISHCONFLICT\|already_published\|409\|cannot publish over" /tmp/npm-publish.log; then
              echo "::warning::Package version already exists in registry — skipping"
            else
              cat /tmp/npm-publish.log
              exit "$EXIT"
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  update-package-list:
    needs: build-and-release
    runs-on: [self-hosted, Linux, ARM64, netbird]
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update package-list.json on fhir.cognovis.de
        env:
          IG_VERSION: ${{ steps.version.outputs.version }}
          PACKAGE_ID: de.cognovis.fhir.dental
          PUBLIC_IG_PATH: https://fhir.cognovis.de/dental
          REMOTE_PACKAGE_LIST: /opt/fhir-proxy/html/dental/package-list.json
          PACKAGE_LIST_EXACT_PATH_ONLY: "true"
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TODAY=$(date -u +%Y-%m-%d)

          python3 .github/scripts/update-package-list-remote.py \
            "$IG_VERSION" "$TODAY" "$PACKAGE_ID" "$PUBLIC_IG_PATH" "$REMOTE_PACKAGE_LIST"

          python3 .github/scripts/verify-fhir-release-publication.py \
            --version "$IG_VERSION" \
            --package-id "$PACKAGE_ID" \
            --public-ig-path "$PUBLIC_IG_PATH" \
            --repository "$GITHUB_REPOSITORY"
