name: IG Release — Publish & Deploy

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "ig-release"
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION file
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag ${TAG_VERSION} does not match VERSION file ${FILE_VERSION}"
            exit 1
          fi
          echo "Version match confirmed: ${FILE_VERSION}"

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Install fhir-praxis-de dependency
        run: |
          # Download latest praxis package from GitHub Releases (take last asset = newest version)
          ASSET_URL=$(curl -s https://api.github.com/repos/cognovis/fhir-praxis-de/releases/latest \
            | jq -r '[.assets[] | select(.name | startswith("de.cognovis.fhir.praxis"))] | last | .browser_download_url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "::error::Could not find fhir-praxis-de release asset"
            exit 1
          fi
          echo "Downloading praxis dependency from: $ASSET_URL"
          curl -L -o /tmp/praxis.tgz "$ASSET_URL"
          # Extract version from package.json inside the tgz
          PRAXIS_VERSION=$(tar xzf /tmp/praxis.tgz -O package/package.json | jq -r '.version')
          echo "Praxis version: $PRAXIS_VERSION"
          # Install under versioned name (for pinned deps) and current (for backwards compat)
          for LABEL in "$PRAXIS_VERSION" "current"; do
            mkdir -p "$HOME/.fhir/packages/de.cognovis.fhir.praxis#${LABEL}"
            tar xzf /tmp/praxis.tgz -C "$HOME/.fhir/packages/de.cognovis.fhir.praxis#${LABEL}/"
          done

      - name: Build FHIR package
        run: bash scripts/build-package.sh

      - name: Download IG Publisher
        run: |
          mkdir -p input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o input-cache/publisher.jar

      - name: Install Jekyll
        run: sudo gem install jekyll

      - name: Run IG Publisher
        run: java -jar input-cache/publisher.jar -ig . -no-sushi

      - name: Copy root files to output
        run: |
          [ -f ".package-list.json" ] && cp .package-list.json output/package-list.json
          [ -f "publication-request.json" ] && cp publication-request.json output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/*.tgz
            output/full-ig.zip
          generate_release_notes: true
          make_latest: true

      - name: Publish to FHIR Package Registry
        env:
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
        run: |
          # Configure npm for cognovis FHIR registry
          # VERDACCIO_TOKEN must be a Base64-encoded password (as stored in GitHub Secrets)
          echo "//npm.cognovis.de/:_password=${VERDACCIO_TOKEN}" >> ~/.npmrc
          echo "//npm.cognovis.de/:username=cognovis" >> ~/.npmrc
          echo "//npm.cognovis.de/:email=info@cognovis.de" >> ~/.npmrc

          # Find the built package
          PKG=$(ls dist/*.tgz | head -1)
          echo "Publishing ${PKG} to npm.cognovis.de..."
          npm publish "${PKG}" --registry https://npm.cognovis.de 2>&1 | tee /tmp/npm-publish.log
          EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" -ne 0 ]; then
            if grep -q "EPUBLISHCONFLICT\|already_published\|409" /tmp/npm-publish.log; then
              echo "::warning::Package version already exists in registry — skipping"
            else
              cat /tmp/npm-publish.log
              exit "$EXIT"
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
