name: Bump fhir-praxis-de pin

on:
  repository_dispatch:
    types: [ig-published]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-praxis-pin:
    if: github.event.client_payload.package_id == 'de.cognovis.fhir.praxis'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: echo "new_version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"

      - name: Check for existing open PR
        id: pr_check
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          BRANCH="automation/bump-praxis-pin-${NEW_VERSION}"
          if git ls-remote --heads origin "refs/heads/${BRANCH}" | grep -q .; then
            echo "Branch ${BRANCH} already exists — PR likely already created, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update sushi-config.yaml
        if: steps.pr_check.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          python3 - <<PYEOF
          import re
          new_version = "${NEW_VERSION}"
          content = open('sushi-config.yaml').read()
          content = re.sub(
              r'(  de\.cognovis\.fhir\.praxis: )\S+',
              lambda m: m.group(1) + new_version,
              content
          )
          open('sushi-config.yaml', 'w').write(content)
          PYEOF
          echo "Updated sushi-config.yaml: de.cognovis.fhir.praxis -> ${NEW_VERSION}"

      - name: Create branch, commit, and open PR
        if: steps.pr_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          BRANCH="automation/bump-praxis-pin-${NEW_VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "${BRANCH}"
          git add sushi-config.yaml
          git commit -m "chore: bump de.cognovis.fhir.praxis pin to ${NEW_VERSION}"
          git push origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: bump de.cognovis.fhir.praxis pin to ${NEW_VERSION}" \
            --body "Automated pin bump triggered by fhir-praxis-de release \`${NEW_VERSION}\`.

          Updates \`sushi-config.yaml\` dependency \`de.cognovis.fhir.praxis\` to \`${NEW_VERSION}\`.

          > Generated by the \`bump-praxis-pin\` receiver workflow in response to the \`ig-published\` repository_dispatch event."
