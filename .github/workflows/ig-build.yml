name: IG Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Ruby & Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Install fhir-praxis-de dependency
        run: |
          # Download latest praxis package from GitHub Releases (take last asset = newest version)
          ASSET_URL=$(curl -s https://api.github.com/repos/cognovis/fhir-praxis-de/releases/latest \
            | jq -r '[.assets[] | select(.name | startswith("de.cognovis.fhir.praxis"))] | last | .browser_download_url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "::error::Could not find fhir-praxis-de release asset"
            exit 1
          fi
          echo "Downloading praxis dependency from: $ASSET_URL"
          curl -L -o /tmp/praxis.tgz "$ASSET_URL"
          mkdir -p ~/.fhir/packages/de.cognovis.fhir.praxis#0.13.0
          tar xzf /tmp/praxis.tgz -C ~/.fhir/packages/de.cognovis.fhir.praxis#0.13.0/

      - name: Run SUSHI
        run: sushi .

      - name: Download IG Publisher
        run: |
          mkdir -p input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o input-cache/publisher.jar

      - name: Run IG Publisher
        run: java -jar input-cache/publisher.jar -ig .

      - name: Copy root files to output
        run: |
          # package-list.json must be served at the canonical URL but not in root during build
          # (IG Publisher flags it as error if found in root)
          [ -f ".package-list.json" ] && cp .package-list.json output/package-list.json
          [ -f "publication-request.json" ] && cp publication-request.json output/

      - name: Build release package
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          PACKAGE_ID=$(grep '^id:' sushi-config.yaml | awk '{print $2}')
          mkdir -p dist
          # Strip internal deps (not on public registries) from tgz package.json.
          # de.cognovis.fhir.praxis is needed at SUSHI build time but consumers
          # provide it separately via localTgzPackage in their codegen scripts.
          TMPDIR=$(mktemp -d)
          tar xzf output/package.tgz -C "$TMPDIR"
          jq 'del(.dependencies["de.cognovis.fhir.praxis"])' "$TMPDIR/package/package.json" > "$TMPDIR/package/package.json.tmp"
          mv "$TMPDIR/package/package.json.tmp" "$TMPDIR/package/package.json"
          tar czf "dist/${PACKAGE_ID}-${VERSION}.tgz" -C "$TMPDIR" package
          rm -rf "$TMPDIR"
          echo "Built dist/${PACKAGE_ID}-${VERSION}.tgz (internal deps stripped)"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ig-package
          path: |
            dist/*.tgz
            output/full-ig.zip

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ig-package
          path: artifacts

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: artifacts/dist/*.tgz
          generate_release_notes: true
          make_latest: true
