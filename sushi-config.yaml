id: de.cognovis.fhir.dental
canonical: https://fhir.cognovis.de/dental
name: GermanDentalProfiles
title: German Dental FHIR Profiles (R4)
description: >-
  FHIR R4 profiles for German dental practice — procedures (BEMA/GOZ),
  conditions (ICD-10-GM), findings (Zahnschema/FDI), and communication.
  Built on German base profiles (de.basisprofil.r4, KBV).
status: active
version: 0.24.0
fhirVersion: 4.0.1
copyrightYear: 2026+
copyright: Copyright 2026+ cognovis GmbH. Licensed under CC-BY-4.0.
releaseLabel: trial-use
license: CC-BY-4.0
publisher:
  name: cognovis GmbH
  url: https://www.cognovis.de
  email: info@cognovis.de
jurisdiction: urn:iso:std:iso:3166#DE "Germany"

dependencies:
  de.basisprofil.r4: 1.6.0-ballot2
  kbv.basis: 1.8.0                  # KBV Basisprofile — Condition/Diagnosis, Patient base
  kbv.ita.for: 1.3.1                # KBV Formular-Anforderungen — KBV_PR_FOR_Patient for dental
  de.gematik.fhir.atf: 1.4.1        # ATF MessageHeader for KIM/TIM transport
  de.cognovis.fhir.praxis: 0.40.3    # Praxis-DE Foundation — Abrechnungsquartal, Scheintyp etc.
  hl7.fhir.uv.tools.r4: 1.1.2       # R4-specific version required; 1.1.2 has snapshot-base-version extension

pages:
  index.md:
    title: Home
  profiles.md:
    title: Profiles
  codesystems.md:
    title: Code Systems
  valuesets.md:
    title: Value Sets
  usecases.md:
    title: Use Cases
  lab-orders.md:
    title: Clinical Lab Orders
  sws-mapping.md:
    title: SWS 2.0 Mapping
  international-interoperability.md:
    title: International Interoperability

